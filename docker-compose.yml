version: "3.9"

services:
  web:
    build: .docker
    volumes: 
      - .:/app/
    ports:
      - 80:80
    command: ["yarn", "--cwd=/app", "start"]
    restart: always  # or 'on-failure' or 'unless-stopped'


  db:
    image: mariadb:latest  
    volumes:
      - ../.data_mysql:/var/lib/mysql
    command:
      - "--default-authentication-plugin=mysql_native_password"
      - "--lower_case_table_names=1"       
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: anetdb
      MYSQL_USER: userdb
      MYSQL_PASSWORD: passdb
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    links:
      - db
    depends_on:
      - db
    ports:
      - 8080:80